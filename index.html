<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <title>Liga MX Pronósticos</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <header class="app-header">
      <div class="header-text">
        <span class="header-title" id="header-title">Jornada 14</span>
        <span class="header-sub" id="header-sub">Liga MX · Pronósticos</span>
      </div>
    </header>

    <main class="main-content">
      <section id="section-inicio"   class="section active"></section>
      <section id="section-tabla"    class="section"></section>
      <section id="section-contexto" class="section"></section>
      <section id="section-tracker"  class="section"></section>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-section="inicio">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        <span>Tabla</span>
      </button>
      <button class="nav-btn" data-section="contexto">
        <svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        <span>Contexto</span>
      </button>
      <button class="nav-btn" data-section="tracker">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Tracker</span>
      </button>
    </nav>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
